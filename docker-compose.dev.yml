services:
  nginx:
    ports: !override
      - "8080:80"
    volumes: !override
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./previews:/data/previews:ro
      - ./特效/gifs:/data/gifs:ro
      - ./特效/data:/data/effects-data:ro
      - ./icon_png_results:/data/icons:ro
