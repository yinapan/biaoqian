services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: biaoqiao
      POSTGRES_USER: biaoqiao
      POSTGRES_PASSWORD: biaoqiao_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c shared_buffers=512MB
        -c effective_cache_size=4GB
        -c work_mem=64MB
        -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biaoqiao"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  elasticsearch:
    image: biaoqiao-elasticsearch:8.15.0-ik
    build:
      context: ./docker/elasticsearch
      args:
        ELASTICSEARCH_BASE_IMAGE: ${ELASTICSEARCH_BASE_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.15.0}
        IK_PLUGIN_URL: ${IK_PLUGIN_URL:-https://get.infini.cloud/elasticsearch/analysis-ik/8.15.0}
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 4G

  backend:
    image: biaoqiao-backend:dev
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./backend:/app
      - ./runtime_data/previews:/data/previews
      - ./runtime_data/effect/gifs:/data/gifs:ro
      - ./runtime_data/ui/pngs:/data/icons:ro
    environment:
      - DATABASE_URL=postgresql://biaoqiao:biaoqiao_dev@postgres:5432/biaoqiao
      - ES_URL=http://elasticsearch:9200
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-admin-key-change-in-prod}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-ark-code-latest}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./runtime_data/previews:/data/previews:ro
      - ./runtime_data/effect/gifs:/data/gifs:ro
      - ./runtime_data/ui/pngs:/data/icons:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pg_data:
  es_data:
