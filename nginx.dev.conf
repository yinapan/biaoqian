upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;
    server_tokens off;
    client_max_body_size 2G;

    # --- Compression ---
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_vary on;
    gzip_proxied any;

    keepalive_timeout 65;
    proxy_buffering on;

    # --- Admin API ---
    location /api/v1/admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    # --- Backend API ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    # --- Static previews ---
    location /static/previews/ {
        alias /data/previews/;
        expires 7d;
        add_header Cache-Control "public";
        open_file_cache max=2000 inactive=30m;
        open_file_cache_valid 60m;
    }

    location /data/gifs/ {
        alias /data/gifs/;
        expires 7d;
        add_header Cache-Control "public";
        open_file_cache max=1000 inactive=30m;
        open_file_cache_valid 60m;
    }

    location /data/icons/ {
        alias /data/icons/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        open_file_cache max=5000 inactive=60m;
        open_file_cache_valid 120m;
    }

    # --- Frontend assets (hashed filenames) ---
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Frontend SPA ---
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
